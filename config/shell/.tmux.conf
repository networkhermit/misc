set-option -s default-terminal tmux-256color
set-option -s escape-time 10
set-option -s focus-events on
set-option -as terminal-features ',xterm-256color:RGB'

#set-option -g default-command "${SHELL}"
set-option -g default-command fish
set-option -g display-time 3000
set-option -g history-limit 10000
set-option -g mouse on
set-option -g renumber-windows on
set-option -g status-keys emacs

set-option -g aggressive-resize on
set-option -g mode-keys vi
set-option -g window-size largest

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key s {
    split-window -v -c '#{s|file.//#H||:pane_path}'
}
bind-key v {
    split-window -h -c '#{s|file.//#H||:pane_path}'
}

bind-key -T root M-\; {
    set-option key-table off
    set-option prefix None
    set-option set-clipboard on
    set-option status off
    set-option pane-active-border-style none
    set-option pane-border-style none
    set-option pane-border-lines heavy
    if-shell -F '#{!=:#{window_zoomed_flag},1}' {
        resize-pane -Z
    }
    if-shell -F '#{==:#{pane_mode},copy-mode}' {
        send-keys -X cancel
    }
    refresh-client -S
}
bind-key -T off M-\; {
    set-option -u key-table
    set-option -u prefix
    set-option -u set-clipboard
    set-option -u status
    set-option -u pane-active-border-style
    set-option -u pane-border-style
    set-option -u pane-border-lines
    if-shell -F '#{window_zoomed_flag}' {
        resize-pane -Z
    }
    refresh-client -S
}

unbind -T root MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane

# Nord Theme

set-option -g display-panes-active-colour brightblack
set-option -g display-panes-colour black
set-option -g message-command-style bg=brightblack,fg=cyan
set-option -g message-style bg=brightblack,fg=cyan
set-option -g status-interval 1
set-option -g status-left "#[fg=black,bg=blue,bold] #S "
set-option -g status-right "#[fg=white,bg=brightblack] %Y-%m-%d #[fg=white,bg=brightblack,nobold,noitalics,nounderscore]|#[fg=white,bg=brightblack] %H:%M #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore] #[fg=black,bg=cyan,bold] #H "
set-option -g status-style bg=black,fg=white

set-option -gw clock-mode-colour cyan
set-option -gw pane-active-border-style bg=default,fg=blue
set-option -gw pane-border-style bg=default,fg=brightblack
set-option -gw window-status-current-format " #[fg=black,bg=cyan]#I#[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#W #F"
set-option -gw window-status-format " #[fg=white,bg=brightblack]#I #[fg=white,bg=brightblack]#W #F"
set-option -gw window-status-separator ''
